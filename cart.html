<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Bread of Life Mills</title>

  <link rel="stylesheet" href="styles.css" />

  <style>
    @font-face {
      font-family: 'DejaVu Serif';
      src: url('DejaVuSerif.woff2?v=2') format('woff2');
    }

    @font-face {
      font-family: 'DejaVu Serif';
      src: url('DejaVuSerif-Bold.woff2') format('woff2');
      font-weight: 700;
    }

    body {
      margin: 0;
      padding: 0;
      background-image: url('parchment_tile.jpg');
      background-repeat: repeat;
      background-size: 50%;
      font-family: 'DejaVu Serif', serif;
      color: #5a3f2a;
    }

    .page-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 22px 80px 22px;
    }

    h1 {
      text-align: center;
      font-size: 46px;
      margin-bottom: 28px;
    }

    .cart-item {
      border-bottom: 2px solid rgba(90, 63, 42, 0.35);
      padding: 18px 0;
    }

    .cart-item h2 {
      margin: 0 0 8px 0;
      font-size: 25px;
    }

    .cart-item p {
      margin: 4px 0;
      font-size: 18px;
      font-weight: 600;
    }

    /* 🔥 REMOVE BUTTON FIX */
    .remove-item-button {
      margin-top: 8px;
      padding: 6px 12px;
      font-family: 'DejaVu Serif', serif;
      font-size: 14px;
      font-weight: 700;
      color: #5a3f2a;
      background: rgba(255, 248, 220, 0.85);
      border: 2px solid #5a3f2a;
      cursor: pointer;
    }

    .cart-totals {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 3px solid rgba(90, 63, 42, 0.45);
      font-size: 21px;
      font-weight: 700;
    }

    .cart-empty {
      text-align: center;
      font-size: 22px;
      margin-top: 40px;
    }

    .cart-actions {
      margin-top: 28px;
      text-align: center;
    }

    .cart-button {
      margin: 8px;
      padding: 10px 18px;
      font-size: 17px;
      font-weight: 700;
      color: #5a3f2a;
      background: rgba(255, 248, 220, 0.85);
      border: 2px solid #5a3f2a;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .cart-actions {
        margin-top: 32px;
      }

      #clear-cart-button {
        margin-top: 13px;
      }
    }
  </style>
</head>
<body>

<div class="page-content">
  <h1>Your Cart</h1>

  <div id="cart-items"></div>

  <div id="cart-totals" class="cart-totals"></div>

  <div class="cart-actions">
    <a href="shop-wheat.html" class="cart-button">Continue Shopping</a>
    <button id="clear-cart-button" class="cart-button">Clear Cart</button>
  </div>
</div>

<script>
  const salesTaxRate = 0.0855;

  const cartItemsContainer = document.getElementById('cart-items');
  const cartTotalsContainer = document.getElementById('cart-totals');
  const clearCartButton = document.getElementById('clear-cart-button');

  function formatCurrency(amount) {
    return '$' + amount.toFixed(2);
  }

  function getCart() {
    return JSON.parse(localStorage.getItem('breadOfLifeCart')) || [];
  }

  function saveCart(cart) {
    localStorage.setItem('breadOfLifeCart', JSON.stringify(cart));
  }

  function removeItem(itemId) {
    let cart = getCart();
    cart = cart.filter(item => item.id !== itemId);
    saveCart(cart);
    renderCart();
  }

  function renderCart() {
    const cart = getCart();

    cartItemsContainer.innerHTML = '';
    cartTotalsContainer.innerHTML = '';

    if (cart.length === 0) {
      cartItemsContainer.innerHTML = '<p class="cart-empty">Your cart is currently empty.</p>';
      cartTotalsContainer.style.display = 'none';
      return;
    }

    let subtotal = 0;

    cart.forEach(function (item) {
      const itemSubtotal = item.price * item.quantity;
      subtotal += itemSubtotal;

      const itemElement = document.createElement('div');
      itemElement.className = 'cart-item';

      itemElement.innerHTML =
        '<h2>' + item.name + '</h2>' +
        '<p>Size: ' + item.size + '</p>' +
        '<p>Quantity: ' + item.quantity + '</p>' +
        '<p>Price Each: ' + formatCurrency(item.price) + '</p>' +
        '<p>Item Subtotal: ' + formatCurrency(itemSubtotal) + '</p>' +
        '<button class="remove-item-button" onclick="removeItem(\'' + item.id + '\')">Remove Item</button>';

      cartItemsContainer.appendChild(itemElement);
    });

    const salesTax = subtotal * salesTaxRate;
    const total = subtotal + salesTax;

    cartTotalsContainer.innerHTML =
      '<p>Subtotal: ' + formatCurrency(subtotal) + '</p>' +
      '<p>Sales Tax: ' + formatCurrency(salesTax) + '</p>' +
      '<p>Total: ' + formatCurrency(total) + '</p>';
  }

  clearCartButton.addEventListener('click', function () {
    localStorage.removeItem('breadOfLifeCart');
    renderCart();
  });

  renderCart();
</script>

</body>
</html>
