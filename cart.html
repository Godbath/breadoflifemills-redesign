<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Bread of Life Mills</title>

  <link rel="stylesheet" href="styles.css" />

  <style>
    @font-face {
      font-family: 'DejaVu Serif';
      src: url('DejaVuSerif.woff2?v=2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'DejaVu Serif';
      src: url('DejaVuSerif-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
    }

    body {
      margin: 0;
      padding: 0;
      background-image: url('parchment_tile.jpg');
      background-repeat: repeat;
      background-position: top left;
      background-size: 50%;
      font-family: 'DejaVu Serif', serif;
      color: #5a3f2a;
      overflow-x: hidden;
    }

    .page-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 22px 80px 22px;
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      font-size: 46px;
      margin: 0 0 28px 0;
      font-weight: 700;
    }

    h2 {
      font-size: 30px;
      margin: 36px 0 12px 0;
      text-align: center;
    }

    .cart-item {
      border-bottom: 2px solid rgba(90, 63, 42, 0.35);
      padding: 18px 0;
    }

    .cart-item h2 {
      margin: 0 0 8px 0;
      font-size: 25px;
      text-align: left;
    }

    .cart-item p {
      margin: 4px 0;
      font-size: 18px;
      font-weight: 600;
    }

    .remove-item-button {
      margin-top: 8px;
      padding: 6px 12px;
      font-family: 'DejaVu Serif', serif;
      font-size: 14px;
      font-weight: 700;
      color: #5a3f2a;
      background: rgba(255, 248, 220, 0.85);
      border: 2px solid #5a3f2a;
      cursor: pointer;
    }

    .cart-totals {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 3px solid rgba(90, 63, 42, 0.45);
      font-size: 21px;
      font-weight: 700;
    }

    .cart-totals p {
      margin: 8px 0;
    }

    .cart-empty {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-top: 40px;
    }

    .cart-actions {
      margin-top: 28px;
      text-align: center;
    }

    .cart-button {
      display: inline-block;
      margin: 8px;
      padding: 10px 18px;
      font-family: 'DejaVu Serif', serif;
      font-size: 17px;
      font-weight: 700;
      color: #5a3f2a;
      background: rgba(255, 248, 220, 0.85);
      border: 2px solid #5a3f2a;
      text-decoration: none;
      cursor: pointer;
    }

    .order-note {
      max-width: 760px;
      margin: 34px auto 22px auto;
      font-size: 18px;
      line-height: 1.55;
      font-weight: 600;
      text-align: center;
    }

    .order-form {
      max-width: 620px;
      margin: 0 auto;
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-field label {
      display: block;
      margin-bottom: 6px;
      font-size: 17px;
      font-weight: 700;
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 9px;
      font-family: 'DejaVu Serif', serif;
      font-size: 16px;
      color: #5a3f2a;
      background: rgba(255, 248, 220, 0.85);
      border: 2px solid rgba(90, 63, 42, 0.75);
    }

    .form-field textarea {
      min-height: 110px;
      resize: vertical;
    }

    .order-summary-preview {
      white-space: pre-wrap;
      margin-top: 18px;
      padding: 14px;
      border: 2px solid rgba(90, 63, 42, 0.45);
      background: rgba(255, 248, 220, 0.45);
      font-size: 15px;
      line-height: 1.45;
      display: none;
    }

    .form-message {
      margin-top: 14px;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      min-height: 22px;
    }

    @media (max-width: 768px) {
      body {
        background-size: 100%;
      }

      h1 {
        font-size: 36px;
      }

      h2 {
        font-size: 26px;
      }

      .cart-item h2 {
        font-size: 23px;
      }

      .cart-item p,
      .cart-totals {
        font-size: 18px;
      }

      .order-note {
        font-size: 17px;
      }

      .cart-actions {
        margin-top: 32px;
      }

      #clear-cart-button {
        margin-top: 26px;
      }
    }
  </style>
</head>
<body>

  <div class="page-content">
    <h1>Your Cart</h1>

    <div id="cart-items"></div>

    <div id="cart-totals" class="cart-totals"></div>

    <div class="cart-actions">
      <a href="shop-wheat.html" class="cart-button">Continue Shopping</a>
      <button id="clear-cart-button" class="cart-button">Clear Cart</button>
    </div>

    <p class="order-note">
      We produce our goods in small batches with freshness as our priority. Every order is personally reviewed and confirmed for availability, and you’ll receive a call to finalize details before payment.
    </p>

    <h2>Order Request</h2>

    <form id="order-request-form" class="order-form" action="https://api.staticforms.xyz/submit" method="POST">
      <input type="hidden" name="accessKey" value="sf_89c447b418c7e6e6283f4104">
      <input type="hidden" name="subject" value="New Bread of Life Mills Order Request">
      <input type="hidden" name="redirectTo" value="https://breadoflifemills.com/thank-you.html">
      <input id="order-number-field" name="orderNumber" type="hidden">
      <input id="order-summary-field" name="orderSummary" type="hidden">
      <input id="receipt-field" name="receipt" type="hidden">

      <div class="form-field">
        <label for="customer-name">Name *</label>
        <input id="customer-name" name="name" type="text" required>
      </div>

      <div class="form-field">
        <label for="customer-phone">Phone *</label>
        <input id="customer-phone" name="phone" type="tel" required>
      </div>

      <div class="form-field">
        <label for="customer-email">Email *</label>
        <input id="customer-email" name="email" type="email" required>
      </div>

      <div class="form-field">
        <label for="pickup-location">Preferred Pickup Location *</label>
        <select id="pickup-location" name="pickupLocation" required>
          <option value="">Select a pickup location</option>
          <option value="Sierra Vista Food Co-op">Sierra Vista Food Co-op</option>
          <option value="Whetstone / Sierra Vista Area">Whetstone / Sierra Vista Area</option>
          <option value="Benson Area">Benson Area</option>
          <option value="Patagonia Area">Patagonia Area</option>
          <option value="Tucson Area">Tucson Area</option>
          <option value="Other / Please contact me">Other / Please contact me</option>
        </select>
      </div>

      <div class="form-field">
        <label for="customer-notes">Notes / Questions</label>
        <textarea id="customer-notes" name="notes"></textarea>
      </div>

      <div class="cart-actions">
        <button type="submit" class="cart-button">Complete Order Request</button>
      </div>

      <div id="order-summary-preview" class="order-summary-preview"></div>

      <p id="form-message" class="form-message" aria-live="polite"></p>
    </form>
  </div>

  <script>
    const salesTaxRate = 0.0855;

    const cartItemsContainer = document.getElementById('cart-items');
    const cartTotalsContainer = document.getElementById('cart-totals');
    const clearCartButton = document.getElementById('clear-cart-button');
    const orderForm = document.getElementById('order-request-form');
    const orderNumberField = document.getElementById('order-number-field');
    const orderSummaryField = document.getElementById('order-summary-field');
    const receiptField = document.getElementById('receipt-field');
    const orderSummaryPreview = document.getElementById('order-summary-preview');
    const formMessage = document.getElementById('form-message');

    function formatCurrency(amount) {
      return '$' + amount.toFixed(2);
    }

    function getCart() {
      return JSON.parse(localStorage.getItem('breadOfLifeCart')) || [];
    }

    function saveCart(cart) {
      localStorage.setItem('breadOfLifeCart', JSON.stringify(cart));
    }

    function calculateCartTotals(cart) {
      let subtotal = 0;

      cart.forEach(function (item) {
        subtotal += item.price * item.quantity;
      });

      const salesTax = subtotal * salesTaxRate;
      const total = subtotal + salesTax;

      return {
        subtotal: subtotal,
        salesTax: salesTax,
        total: total
      };
    }

    function generateOrderNumber() {
      const counterKey = 'breadOfLifeOrderCounter';
      let counter = parseInt(localStorage.getItem(counterKey), 10);

      if (!counter || counter < 100000 || counter > 999999) {
        counter = Math.floor(100000 + Math.random() * 900000);
      } else {
        counter += 1;
      }

      if (counter > 999999) {
        counter = 100000;
      }

      localStorage.setItem(counterKey, counter);

      const suffixCharacters = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let suffix = '';

      for (let i = 0; i < 3; i += 1) {
        suffix += suffixCharacters.charAt(Math.floor(Math.random() * suffixCharacters.length));
      }

      return counter + '-' + suffix;
    }

    function getCustomerData() {
      return {
        name: document.getElementById('customer-name').value.trim(),
        phone: document.getElementById('customer-phone').value.trim(),
        email: document.getElementById('customer-email').value.trim(),
        pickupLocation: document.getElementById('pickup-location').value,
        notes: document.getElementById('customer-notes').value.trim()
      };
    }

    function buildReceiptText(orderNumber, cart, totals, customerData) {
      let receipt = 'Bread of Life Mills Order Request Receipt\n';
      receipt += 'Order Number: ' + orderNumber + '\n';
      receipt += 'Submitted: ' + new Date().toLocaleString() + '\n\n';

      receipt += 'Customer Information\n';
      receipt += 'Name: ' + customerData.name + '\n';
      receipt += 'Phone: ' + customerData.phone + '\n';
      receipt += 'Email: ' + customerData.email + '\n';
      receipt += 'Preferred Pickup Location: ' + customerData.pickupLocation + '\n';
      receipt += 'Notes / Questions: ' + (customerData.notes || 'None') + '\n\n';

      receipt += 'Order Items\n';

      cart.forEach(function (item) {
        const itemSubtotal = item.price * item.quantity;

        receipt += item.name + '\n';
        receipt += 'Size / Type: ' + item.size + '\n';
        receipt += 'Quantity: ' + item.quantity + '\n';
        receipt += 'Price Each: ' + formatCurrency(item.price) + '\n';
        receipt += 'Item Subtotal: ' + formatCurrency(itemSubtotal) + '\n\n';
      });

      receipt += 'Subtotal: ' + formatCurrency(totals.subtotal) + '\n';
      receipt += 'Sales Tax: ' + formatCurrency(totals.salesTax) + '\n';
      receipt += 'Total: ' + formatCurrency(totals.total) + '\n\n';
      receipt += 'This is an order request receipt, not a paid invoice. Bread of Life Mills will contact you to confirm availability, pickup details, and payment.';

      return receipt;
    }

    function buildOrderSummary() {
      const cart = getCart();
      const totals = calculateCartTotals(cart);

      let summary = 'Bread of Life Mills Order Request\n\n';

      cart.forEach(function (item) {
        const itemSubtotal = item.price * item.quantity;

        summary += item.name + '\n';
        summary += 'Size / Type: ' + item.size + '\n';
        summary += 'Quantity: ' + item.quantity + '\n';
        summary += 'Price Each: ' + formatCurrency(item.price) + '\n';
        summary += 'Item Subtotal: ' + formatCurrency(itemSubtotal) + '\n\n';
      });

      summary += 'Subtotal: ' + formatCurrency(totals.subtotal) + '\n';
      summary += 'Sales Tax: ' + formatCurrency(totals.salesTax) + '\n';
      summary += 'Total: ' + formatCurrency(totals.total);

      return summary;
    }

    function removeItem(itemId) {
      let cart = getCart();
      cart = cart.filter(function (item) {
        return item.id !== itemId;
      });
      saveCart(cart);
      renderCart();
    }

    function renderCart() {
      const cart = getCart();

      cartItemsContainer.innerHTML = '';
      cartTotalsContainer.innerHTML = '';
      orderSummaryPreview.textContent = '';
      orderSummaryPreview.style.display = 'none';
      formMessage.textContent = '';

      if (cart.length === 0) {
        cartItemsContainer.innerHTML = '<p class="cart-empty">Your cart is currently empty.</p>';
        cartTotalsContainer.style.display = 'none';
        orderForm.style.display = 'none';
        return;
      }

      cartTotalsContainer.style.display = 'block';
      orderForm.style.display = 'block';

      cart.forEach(function (item) {
        const itemSubtotal = item.price * item.quantity;

        const itemElement = document.createElement('div');
        itemElement.className = 'cart-item';

        const itemTitle = document.createElement('h2');
        itemTitle.textContent = item.name;

        const itemSize = document.createElement('p');
        itemSize.textContent = 'Size / Type: ' + item.size;

        const itemQuantity = document.createElement('p');
        itemQuantity.textContent = 'Quantity: ' + item.quantity;

        const itemPrice = document.createElement('p');
        itemPrice.textContent = 'Price Each: ' + formatCurrency(item.price);

        const itemSubtotalLine = document.createElement('p');
        itemSubtotalLine.textContent = 'Item Subtotal: ' + formatCurrency(itemSubtotal);

        const removeButton = document.createElement('button');
        removeButton.className = 'remove-item-button';
        removeButton.type = 'button';
        removeButton.textContent = 'Remove Item';
        removeButton.addEventListener('click', function () {
          removeItem(item.id);
        });

        itemElement.appendChild(itemTitle);
        itemElement.appendChild(itemSize);
        itemElement.appendChild(itemQuantity);
        itemElement.appendChild(itemPrice);
        itemElement.appendChild(itemSubtotalLine);
        itemElement.appendChild(removeButton);

        cartItemsContainer.appendChild(itemElement);
      });

      const totals = calculateCartTotals(cart);

      cartTotalsContainer.innerHTML =
        '<p>Subtotal: ' + formatCurrency(totals.subtotal) + '</p>' +
        '<p>Sales Tax: ' + formatCurrency(totals.salesTax) + '</p>' +
        '<p>Total: ' + formatCurrency(totals.total) + '</p>';

      orderSummaryField.value = buildOrderSummary();
    }

    clearCartButton.addEventListener('click', function () {
      localStorage.removeItem('breadOfLifeCart');
      renderCart();
    });

    orderForm.addEventListener('submit', function (event) {
      const cart = getCart();

      if (cart.length === 0) {
        event.preventDefault();
        formMessage.textContent = 'Your cart is empty.';
        return;
      }

      const orderNumber = generateOrderNumber();
      const totals = calculateCartTotals(cart);
      const customerData = getCustomerData();
      const receiptText = buildReceiptText(orderNumber, cart, totals, customerData);

      const receiptData = {
        orderNumber: orderNumber,
        submittedAt: new Date().toLocaleString(),
        customer: customerData,
        items: cart,
        subtotal: totals.subtotal,
        salesTax: totals.salesTax,
        total: totals.total,
        receiptText: receiptText
      };

      sessionStorage.setItem('breadOfLifeLastReceipt', JSON.stringify(receiptData));

      orderNumberField.value = orderNumber;
      orderSummaryField.value = buildOrderSummary();
      receiptField.value = receiptText;

      orderSummaryPreview.textContent = receiptText;
      orderSummaryPreview.style.display = 'block';

      formMessage.textContent = 'Submitting your order request...';
    });

    renderCart();
  </script>

</body>
</html>
