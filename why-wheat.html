<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Why Whole Wheat | Bread of Life Mills</title>

  <link rel="stylesheet" href="styles.css" />

  <style>
    @font-face {
      font-family: 'DejaVu Serif';
      src: url('DejaVuSerif.woff2?v=2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      padding: 0;
      background-image: url('parchment_tile.jpg');
      background-repeat: repeat;
      background-position: top left;
      background-size: 50%;
      font-family: 'DejaVu Serif', serif;
      font-weight: normal;
      color: #5a3f2a;
      overflow-x: hidden;
    }

    .page-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0;
      box-sizing: border-box;
    }

    .hero-image {
      text-align: center;
      margin-bottom: 0;
    }

    .hero-image img {
      width: 100%;
      max-width: 748px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px 0;
      text-align: center;
      font-size: 42px;
      font-weight: 600;
      letter-spacing: 0.6px;
    }

    p {
      font-size: 20px;
      line-height: 1.7;
      margin-bottom: 24px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    @media (max-width: 768px) {
      body {
        background-size: 100%;
      }

      .page-content {
        margin: 0 auto 10px auto;
        padding: 0 16px;
      }

      .hero-image {
        margin-top: 0;
        margin-bottom: 6px;
      }

      .hero-image img {
        width: 110%;
        max-width: none;
        height: auto;
        display: block;
        margin: 0;
        position: relative;
        left: 50%;
        transform: translateX(-50%);
      }

      h1 {
        font-size: 34px;
      }

      p {
        font-size: 18px;
        line-height: 1.65;
      }
    }
  </style>
</head>
<body>
  <div class="page-content">
    <div class="hero-image">
      <img src="why-wheat-bg.png?v=2" alt="Why Whole Wheat">
    </div>

    <h1>Why Whole Wheat?</h1>
