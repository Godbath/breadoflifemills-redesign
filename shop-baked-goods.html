<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Baked Goods | Bread of Life Mills</title>

  <link rel="stylesheet" href="styles.css" />

  <style>
    @font-face {
      font-family: 'DejaVu Serif';
      src: url('DejaVuSerif.woff2?v=2') format('woff2');
    }

    @font-face {
      font-family: 'DejaVu Serif';
      src: url('DejaVuSerif-Bold.woff2') format('woff2');
      font-weight: 700;
    }

    body {
      margin: 0;
      background-image: url('parchment_tile.jpg');
      background-size: 50%;
      font-family: 'DejaVu Serif', serif;
      color: #5a3f2a;
    }

    .page-content {
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero-image img {
      width: 100%;
      max-width: 650px;
      display: block;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 46px;
      margin: 0;
    }

    .intro {
      text-align: center;
      font-size: 20px;
      max-width: 760px;
      margin: 0 auto 13px auto;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      padding: 0 24px 60px 24px;
    }

    .product-card {
      text-align: center;
    }

    .product-card img {
      max-width: 260px;
      margin: 0 auto 12px auto;
      display: block;
    }

    .product-option-control select {
      margin-top: 3px;
    }

    .floating-cart-button {
      position: fixed;
      top: 88px;
      right: 23px;
      width: 180px;
    }

    .cart-count {
      position: absolute;
      top: -7px;
      right: 3px;
    }

    .floating-shop-link {
      position: fixed;
      right: 38px;
      width: 150px;
    }

    .floating-wheat-button {
      top: 153px;
    }

    /* 👇 THIS is the swapped button (Flour now) */
    .floating-flour-button {
      top: 236px;
    }

    @media (max-width: 768px) {
      .floating-cart-button {
        top: 38px;
        right: 6px;
        width: 72px;
      }

      .floating-shop-link {
        right: 12px;
        width: 60px;
      }

      .floating-wheat-button {
        top: 95px;
      }

      .floating-flour-button {
        top: 140px;
      }
    }
  </style>
</head>

<body>

<div class="page-content">

  <div class="hero-image">
    <img src="why-wheat-bg.png?v=2">
  </div>

  <h1>Shop Baked Goods</h1>

  <p class="intro">
    Fresh baked sourdough and artisan goods crafted from whole stone-milled flour.
  </p>

  <!-- PRODUCT GRID (UNCHANGED) -->
  <div class="product-grid">
    <!-- your existing products untouched -->
  </div>

</div>

<!-- HOME -->
<a href="/" class="floating-home-button">
  <img src="Home-Button-001.png?v=3">
</a>

<!-- CART -->
<a href="cart.html" class="floating-cart-button">
  <img src="cart-button.png">
  <span id="cart-count" class="cart-count">0</span>
</a>

<!-- WHEAT (unchanged position) -->
<a href="shop-wheat.html" class="floating-shop-link floating-wheat-button">
  <img src="wheat-button.png?v=2">
</a>

<!-- 👇 NEW FLOUR BUTTON (replaces baked goods position) -->
<a href="shop-flour.html" class="floating-shop-link floating-flour-button">
  <img src="flour-button.png?v=2">
</a>

<script>
  const cartCount = document.getElementById('cart-count');

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('breadOfLifeCart')) || [];
    let total = 0;
    cart.forEach(i => total += i.quantity);
    cartCount.textContent = total;
    cartCount.style.display = total > 0 ? 'block' : 'none';
  }

  updateCartCount();
</script>

</body>
</html>
