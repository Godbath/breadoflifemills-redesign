<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Shop Baked Goods | Bread of Life Mills</title>

  <link rel="stylesheet" href="styles.css" />

  <style>
    @font-face {
      font-family: 'DejaVu Serif';
      src: url('DejaVuSerif.woff2?v=2') format('woff2');
    }

    @font-face {
      font-family: 'DejaVu Serif';
      src: url('DejaVuSerif-Bold.woff2') format('woff2');
      font-weight: 700;
    }

    body {
      margin: 0;
      padding: 0;
      background-image: url('parchment_tile.jpg');
      background-repeat: repeat;
      background-size: 50%;
      font-family: 'DejaVu Serif', serif;
      color: #5a3f2a;
      overflow-x: hidden;
    }

    .page-content {
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero-image {
      text-align: center;
    }

    .hero-image img {
      width: 100%;
      max-width: 650px;
      display: block;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 46px;
      margin: 0 0 4px 0;
    }

    .intro {
      max-width: 760px;
      margin: 0 auto 13px auto;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      padding: 0 16px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      padding: 0 24px 60px;
    }

    .product-card {
      text-align: center;
      padding: 14px;
    }

    .product-card img {
      width: 100%;
      max-width: 260px;
      margin: 0 auto 12px;
      display: block;
    }

    .product-card h2 {
      font-size: 25px;
      margin: 0 0 6px;
    }

    .price {
      font-size: 21px;
      margin-bottom: 8px;
    }

    .description {
      font-size: 18px;
    }

    .product-option-control,
    .quantity-control {
      margin: 12px 0 10px;
      font-weight: 700;
    }

    .product-option-control select,
    .quantity-control input {
      padding: 5px;
      margin-left: 6px;
      font-family: 'DejaVu Serif';
    }

    .quantity-control input {
      width: 58px;
      text-align: center;
    }

    .add-to-cart-button {
      padding: 8px 16px;
      font-weight: 700;
      background: rgba(255,248,220,0.85);
      border: 2px solid #5a3f2a;
      cursor: pointer;
    }

    .floating-cart-button {
      position: fixed;
      top: 88px;
      right: 23px;
      width: 180px;
      z-index: 9999;
    }

    .floating-shop-link {
      position: fixed;
      right: 38px;
      width: 150px;
      z-index: 9998;
    }

    .floating-wheat-button { top: 153px; }
    .floating-flour-button { top: 231px; }

    /* ================= MOBILE ================= */

    @media (max-width: 768px) {

      body { background-size: 100%; }

      .page-content {
        padding: 0 16px;
      }

      .hero-image img {
        width: 110%;
        max-width: none;
        position: relative;
        left: 50%;
        transform: translateX(-50%);
      }

      .product-grid {
        grid-template-columns: 1fr;
        gap: 24px;
        padding-bottom: 50px;
      }

      /* ✅ PERFECT ALIGNMENT WITH OTHER PAGES */

      .floating-cart-button {
        top: 38px;
        right: 6px;
        width: 72px;
      }

      .floating-shop-link {
        right: 12px;
        width: 60px;
      }

      .floating-wheat-button { top: 66px; }
      .floating-flour-button { top: 102px; }
    }

    /* LANDSCAPE FIX */
    @media (max-width: 932px) and (max-height: 500px) and (orientation: landscape) {
      .hero-image img {
        width: 100%;
        max-width: 650px;
        margin: 0 auto;
        position: static;
        transform: none;
      }
    }

  </style>
</head>

<body>

<div class="page-content">

  <div class="hero-image">
    <img src="why-wheat-bg.png?v=2">
  </div>

  <h1>Shop Baked Goods</h1>

  <p class="intro">
    Fresh baked sourdough and artisan goods, crafted from whole stone-milled flour.
  </p>

  <div class="product-grid">

    <div class="product-card">
      <img src="hard-red-spring-wheat.jpg">
      <h2>Sourdough Loaf</h2>
      <p class="price">$12.00</p>
      <p class="description">Our classic sourdough.</p>

      <div class="product-option-control">
        <label>Type:</label>
        <select>
          <option>Traditional</option>
          <option>Seasoned</option>
        </select>
      </div>

      <div class="quantity-control">
        <label>Qty:</label>
        <input type="number" value="1">
      </div>

      <button class="add-to-cart-button">Add to Cart</button>
    </div>

  </div>

</div>

<a href="/" class="floating-home-button">
  <img src="Home-Button-001.png?v=3" class="floating-home-button-image">
</a>

<a href="cart.html" class="floating-cart-button">
  <img src="cart-button.png?v=2">
</a>

<a href="shop-wheat.html" class="floating-shop-link floating-wheat-button">
  <img src="wheat-button.png?v=2">
</a>

<a href="shop-flour.html" class="floating-shop-link floating-flour-button">
  <img src="flour-button.png?v=2">
</a>

</body>
</html>
