<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bread of Life Mills</title>
  <link rel="icon" href="favicon.ico?v=4" sizes="any">
  <link rel="icon" type="image/png" sizes="512x512" href="breadoflifemills-favicon-b.png?v=4">
  <link rel="apple-touch-icon" href="breadoflifemills-favicon-b.png?v=4">
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Our Story (far left) */
    .story-menu-wrap {
      transform: translateX(-400px);
    }

    /* Products (CENTERED between Story and Process) */
    .products-menu-wrap {
      transform: translateX(-200px);
    }

    /* Third button spacing */
    .products-baked-link {
      top: calc(100% + 104px);
    }

    /* MOBILE PORTRAIT */
    @media (max-width: 768px) {
      .story-menu-wrap {
        transform: translateX(-106px);
      }

      .products-menu-wrap {
        transform: translateX(-55px); /* halfway between story & process */
      }
    }

    /* MOBILE LANDSCAPE */
    @media (max-height: 500px) and (orientation: landscape) {
      .story-menu-wrap {
        transform: translateX(-220px);
      }

      .products-menu-wrap {
        transform: translateX(-120px); /* halfway again */
      }
    }
  </style>
</head>
<body>
  <main class="mockup-page">
    <div class="mockup-wrap">
      <img
        src="mock-website-003.jpg"
        alt="Bread of Life Mills website mockup"
        class="mockup-image"
      />

      <!-- invisible scroll target -->
      <div id="contact-section" class="anchor-target contact-target" aria-hidden="true"></div>

      <!-- hero button -->
      <a
        href="our-story.html"
        class="hotspot hero-explore-story"
        aria-label="Explore Our Story page"
      ></a>

      <!-- OUR STORY DROPDOWN -->
      <div class="process-menu-wrap story-menu-wrap">
        <a href="#" class="hotspot process-nav"></a>

        <div class="process-dropdown">
          <img src="Our-Story-menu-001.png?v=2" class="process-dropdown-image"/>

          <a href="our-story.html" class="process-dropdown-link process-method-link"></a>
          <a href="why-wheat.html" class="process-dropdown-link process-care-link"></a>
        </div>
      </div>

      <!-- PRODUCTS DROPDOWN (CENTERED) -->
      <div class="process-menu-wrap products-menu-wrap">
        <a href="#" class="hotspot process-nav"></a>

        <div class="process-dropdown">
          <img src="Products-menu.png?v=2" class="process-dropdown-image"/>

          <a href="shop-wheat.html" class="process-dropdown-link process-method-link"></a>
          <a href="shop-flour.html" class="process-dropdown-link process-care-link"></a>
          <a href="shop-baked-goods.html" class="process-dropdown-link products-baked-link"></a>
        </div>
      </div>

      <!-- PROCESS DROPDOWN (right) -->
      <div class="process-menu-wrap">
        <a href="#" class="hotspot process-nav"></a>

        <div class="process-dropdown">
          <img src="Process-Dropdown-001.png" class="process-dropdown-image"/>

          <a href="our-method.html" class="process-dropdown-link process-method-link"></a>
          <a href="care.html" class="process-dropdown-link process-care-link"></a>
        </div>
      </div>

      <!-- CONTACT -->
      <a href="#contact-section" class="hotspot top-contact"></a>

      <!-- EMAIL -->
      <a href="mailto:breadoflifemills@gmail.com" class="hotspot email-link"></a>

    </div>
  </main>
</body>
</html>
