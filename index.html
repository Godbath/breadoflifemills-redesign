<body>
  <main class="mockup-page">

      ></a>

        <div class="process-dropdown">

            <img src="Our-Story-menu-001.png?v=2" alt="Our Story dropdown menu" class="process-dropdown-image"/>

          </div>
        </div>
      </div>

            <a href="shop-wheat.html" class="products-dropdown-link products-wheat-link" aria-label="Go to Shop Wheat page"></a>
            <a href="shop-flour.html" class="products-dropdown-link products-flour-link" aria-label="Go to Shop Flour page"></a>
            <a href="shop-baked-goods.html" class="products-dropdown-link products-baked-link" aria-label="Go to Shop Baked Goods page"></a>
          </div>
        </div>
      </div>

        <a href="#" class="hotspot process-nav" aria-label="Open Process menu"></a>

        <div class="process-dropdown">
          <div class="dropdown-visual">
            <img src="Process-Dropdown-001.png" alt="Process dropdown menu" class="process-dropdown-image"/>

            <a href="our-method.html" class="process-dropdown-link process-method-link" aria-label="Go to Our Method page"></a>

  <a href="cart.html" class="floating-cart-button" aria-label="View cart">
    <img src="cart-button.png?v=2" alt="Cart" class="floating-cart-button-image">
    <span id="cart-count" class="cart-count">0</span>
  </a>

    <img src="wheat-button.png?v=2" alt="Shop Wheat">
  </a>

  <a href="shop-flour.html" class="floating-shop-link floating-flour-button" aria-label="Go to Shop Flour">
    <img src="flour-button.png?v=2" alt="Shop Flour">
  </a>

  <a href="shop-baked-goods.html" class="floating-shop-link floating-baked-goods-button" aria-label="Go to Shop Baked Goods">
    <img src="baked-goods-button.png?v=2" alt="Shop Baked Goods">
  </a>

  <script>
    const cartCount = document.getElementById('cart-count');

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('breadOfLifeCart')) || [];

      let totalItems = 0;

      cart.forEach(function (item) {
        totalItems += item.quantity;
      });

      cartCount.textContent = totalItems;

      if (totalItems > 0) {
        cartCount.style.display = 'block';
      } else {
        cartCount.style.display = 'none';
      }
    }

    updateCartCount();
  </script>
