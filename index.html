<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bread of Life Mills</title>
  <link rel="icon" href="favicon.ico?v=4" sizes="any">
  <link rel="icon" type="image/png" sizes="512x512" href="breadoflifemills-favicon-b.png?v=4">
  <link rel="apple-touch-icon" href="breadoflifemills-favicon-b.png?v=4">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="mockup-page">
    <div class="mockup-wrap">
      <img
        src="mock-website-003.jpg"
        alt="Bread of Life Mills website mockup"
        class="mockup-image"
      />

      <!-- invisible scroll targets -->
      <div id="story-section" class="anchor-target story-target" aria-hidden="true"></div>
      <div id="contact-section" class="anchor-target contact-target" aria-hidden="true"></div>

      <!-- top nav: Our Story -->
      <a
  href="our-story.html"
  class="hotspot top-our-story"
  aria-label="Go to Our Story page"
></a>

      <!-- hero button: Explore Our Story -->
      <a
        <a
  href="our-story.html"
  class="hotspot hero-explore-story"
  aria-label="Explore Our Story page"
></a>

      <!-- top nav: Process dropdown -->
      <div class="process-menu-wrap">
        <a
          href="#"
          class="hotspot process-nav"
          aria-label="Open Process menu"
        ></a>

        <div class="process-dropdown">
          <img
            src="Process-Dropdown-001.png"
            alt="Process dropdown menu"
            class="process-dropdown-image"
          />

          <a
            href="our-method.html"
            class="process-dropdown-link process-method-link"
            aria-label="Go to Our Method page"
          ></a>

          <a
            href="care.html"
            class="process-dropdown-link process-care-link"
            aria-label="Go to Care page"
          ></a>
        </div>
      </div>

      <!-- top nav: Contact -->
      <a
        href="#contact-section"
        class="hotspot top-contact"
        aria-label="Go to Contact section"
      ></a>

      <!-- bottom email -->
      <a
        href="mailto:breadoflifemills@gmail.com"
        class="hotspot email-link"
        aria-label="Email Bread of Life Mills"
      ></a>
    </div>
  </main>
</body>
</html>
