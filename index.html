<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bread of Life Mills</title>
  <link rel="icon" href="favicon.ico?v=4" sizes="any">
  <link rel="icon" type="image/png" sizes="512x512" href="breadoflifemills-favicon-b.png?v=4">
  <link rel="apple-touch-icon" href="breadoflifemills-favicon-b.png?v=4">
  <link rel="stylesheet" href="styles.css?v=3" />

  <style>
    /* Page-specific dropdown alignment controls.
       These rules load after styles.css and intentionally override the shared defaults. */

    .story-menu-wrap {
      transform: translateX(-400px);
    }

    .products-menu-wrap {
      transform: translateX(-183px) translateY(4px);
    }

    .products-menu-wrap .process-dropdown {
      transform: translateX(-128px) translateY(26px);
    }

    /* Independent correction for the Our Story dropdown image. */
    .story-menu-wrap .process-dropdown {
      transform: translateX(calc(-50% - 100px));
    }

    /* Independent correction for the Process dropdown image. */
    .main-process-menu-wrap .process-dropdown {
      transform: translateX(calc(-50% - 100px));
    }

    /* Products dropdown targets are now positioned with explicit top values
       instead of relying on transform-only offsets. */
    .products-menu-wrap .products-dropdown-link {
      position: absolute;
      left: 34%;
      width: 32%;
      height: 10%;
      display: block;
      z-index: 80;
      transform: none;
    }

    .products-wheat-link {
      top: 44%;
    }

    .products-flour-link {
      top: 57%;
    }

    .products-baked-link {
      top: 70%;
    }

    @media (max-width: 768px) {
      .story-menu-wrap {
        transform: translateX(-106px);
      }

      .products-menu-wrap {
        transform: translateX(-50px) translateY(1px);
      }

      .products-menu-wrap .process-dropdown {
        transform: translateX(-80px) translateY(10px);
      }

      .story-menu-wrap .process-dropdown {
        transform: translateX(calc(-50% - 24px));
      }

      .main-process-menu-wrap .process-dropdown {
        transform: translateX(calc(-50% - 24px));
      }

      .products-menu-wrap .products-dropdown-link {
        left: 34%;
        width: 32%;
        height: 10%;
        transform: none;
      }

      .products-wheat-link {
        top: 44%;
      }

      .products-flour-link {
        top: 57%;
      }

      .products-baked-link {
        top: 70%;
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .story-menu-wrap {
        transform: translateX(-220px);
      }

      .products-menu-wrap {
        transform: translateX(-105px) translateY(5px);
      }

      .products-menu-wrap .process-dropdown {
        transform: translateX(-109px) translateY(15px);
      }

      .story-menu-wrap .process-dropdown {
        transform: translateX(calc(-50% - 52px));
      }

      .main-process-menu-wrap .process-dropdown {
        transform: translateX(calc(-50% - 52px));
      }

      .products-menu-wrap .products-dropdown-link {
        left: 34%;
        width: 32%;
        height: 10%;
        transform: none;
      }

      .products-wheat-link {
        top: 44%;
      }

      .products-flour-link {
        top: 57%;
      }

      .products-baked-link {
        top: 70%;
      }
    }

    /* TEMPORARY DEBUG VIEW: visible invisible targets.
       Remove this whole block when target alignment is finished. */
    .hotspot,
    .anchor-target,
    .process-menu-wrap,
    .process-dropdown-link,
    .products-dropdown-link {
      outline: 2px solid rgba(255, 0, 0, 0.9) !important;
      background: rgba(255, 0, 0, 0.22) !important;
    }

    .process-menu-wrap {
      outline: 2px solid rgba(255, 165, 0, 0.95) !important;
      background: rgba(255, 165, 0, 0.22) !important;
    }

    .process-nav {
      outline: 2px solid rgba(0, 128, 255, 0.95) !important;
      background: rgba(0, 128, 255, 0.24) !important;
    }

    .process-dropdown-link,
    .products-dropdown-link {
      outline: 2px solid rgba(0, 255, 0, 0.95) !important;
      background: rgba(0, 255, 0, 0.28) !important;
    }

    .anchor-target {
      outline: 2px solid rgba(128, 0, 255, 0.95) !important;
      background: rgba(128, 0, 255, 0.20) !important;
    }

    .email-link {
      outline: 2px solid rgba(255, 0, 255, 0.95) !important;
      background: rgba(255, 0, 255, 0.30) !important;
    }

    .hero-explore-story {
      outline: 2px solid rgba(255, 255, 0, 0.95) !important;
      background: rgba(255, 255, 0, 0.25) !important;
    }

    .top-contact {
      outline: 2px solid rgba(0, 255, 255, 0.95) !important;
      background: rgba(0, 255, 255, 0.28) !important;
    }

    .process-dropdown {
      display: block !important;
      outline: 2px dashed rgba(0, 0, 255, 0.9) !important;
      background: rgba(0, 0, 255, 0.08) !important;
    }

  </style>
</head>
<body>
  <main class="mockup-page">
    <div class="mockup-wrap">
      <img
        src="mock-website-003.jpg"
        alt="Bread of Life Mills website mockup"
        class="mockup-image"
      />

      <div id="contact-section" class="anchor-target contact-target" aria-hidden="true"></div>

      <a
        href="our-story.html"
        class="hotspot hero-explore-story"
        aria-label="Explore Our Story page"
      ></a>

      <div class="process-menu-wrap story-menu-wrap">
        <a href="#" class="hotspot process-nav" aria-label="Open Our Story menu"></a>

        <div class="process-dropdown">
          <img src="Our-Story-menu-001.png?v=2" alt="Our Story dropdown menu" class="process-dropdown-image"/>

          <a href="our-story.html" class="process-dropdown-link process-method-link" aria-label="Go to Our Story page"></a>
          <a href="why-wheat.html" class="process-dropdown-link process-care-link" aria-label="Go to Why Whole Wheat page"></a>
        </div>
      </div>

      <div class="process-menu-wrap products-menu-wrap">
        <a href="#" class="hotspot process-nav" aria-label="Open Products menu"></a>

        <div class="process-dropdown">
          <img src="Products-menu.png?v=2" alt="Products dropdown menu" class="process-dropdown-image"/>

          <a href="shop-wheat.html" class="products-dropdown-link products-wheat-link" aria-label="Go to Shop Wheat page"></a>
          <a href="shop-flour.html" class="products-dropdown-link products-flour-link" aria-label="Go to Shop Flour page"></a>
          <a href="shop-baked-goods.html" class="products-dropdown-link products-baked-link" aria-label="Go to Shop Baked Goods page"></a>
        </div>
      </div>

      <div class="process-menu-wrap main-process-menu-wrap">
        <a href="#" class="hotspot process-nav" aria-label="Open Process menu"></a>

        <div class="process-dropdown">
          <img src="Process-Dropdown-001.png" alt="Process dropdown menu" class="process-dropdown-image"/>

          <a href="our-method.html" class="process-dropdown-link process-method-link" aria-label="Go to Our Method page"></a>
          <a href="care.html" class="process-dropdown-link process-care-link" aria-label="Go to Care page"></a>
        </div>
      </div>

      <a href="#contact-section" class="hotspot top-contact" aria-label="Go to Contact section"></a>

      <a href="mailto:breadoflifemills@gmail.com" class="hotspot email-link" aria-label="Email Bread of Life Mills"></a>
    </div>
  </main>
</body>
</html>
