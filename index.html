<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bread of Life Mills</title>
  <link rel="icon" href="favicon.ico?v=4" sizes="any">
  <link rel="icon" type="image/png" sizes="512x512" href="breadoflifemills-favicon-b.png?v=4">
  <link rel="apple-touch-icon" href="breadoflifemills-favicon-b.png?v=4">
  <link rel="stylesheet" href="styles.css" />

  <style>
    .story-menu-wrap {
      transform: translateX(-400px); /* desktop */
    }

    .products-menu-wrap {
      transform: translateX(-200px); /* desktop */
    }

    .products-baked-link {
      top: calc(100% + 104px);
    }

    @media (max-width: 768px) {
      .story-menu-wrap {
        transform: translateX(-106px); /* phone portrait */
      }

      .products-menu-wrap {
        transform: translateX(-20px); /* phone portrait */
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .story-menu-wrap {
        transform: translateX(-220px); /* phone landscape */
      }

      .products-menu-wrap {
        transform: translateX(-80px); /* phone landscape */
      }
    }
  </style>
</head>
<body>
  <main class="mockup-page">
    <div class="mockup-wrap">
      <img
        src="mock-website-003.jpg"
        alt="Bread of Life Mills website mockup"
        class="mockup-image"
      />

      <!-- invisible scroll target -->
      <div id="contact-section" class="anchor-target contact-target" aria-hidden="true"></div>

      <!-- hero button: Explore Our Story -->
      <a
        href="our-story.html"
        class="hotspot hero-explore-story"
        aria-label="Explore Our Story page"
      ></a>

      <!-- top nav: Our Story dropdown -->
      <div class="process-menu-wrap story-menu-wrap">
        <a
          href="#"
          class="hotspot process-nav"
          aria-label="Open Our Story menu"
        ></a>

        <div class="process-dropdown">
          <img
            src="Our-Story-menu-001.png?v=2"
            alt="Our Story dropdown menu"
            class="process-dropdown-image"
          />

          <a
            href="our-story.html"
            class="process-dropdown-link process-method-link"
            aria-label="Go to Our Story page"
          ></a>

          <a
            href="why-wheat.html"
            class="process-dropdown-link process-care-link"
            aria-label="Go to Why Whole Wheat page"
          ></a>
        </div>
      </div>

      <!-- top nav: Products dropdown -->
      <div class="process-menu-wrap products-menu-wrap">
        <a
          href="#"
          class="hotspot process-nav"
          aria-label="Open Products menu"
        ></a>

        <div class="process-dropdown">
          <img
            src="Products-menu.png?v=1"
            alt="Products dropdown menu"
            class="process-dropdown-image"
          />

          <a
            href="shop-wheat.html"
            class="process-dropdown-link process-method-link"
            aria-label="Go to Shop Wheat page"
          ></a>

          <a
            href="shop-flour.html"
            class="process-dropdown-link process-care-link"
            aria-label="Go to Shop Flour page"
          ></a>

          <a
            href="shop-baked-goods.html"
            class="process-dropdown-link products-baked-link"
            aria-label="Go to Shop Baked Goods page"
          ></a>
        </div>
      </div>

      <!-- top nav: Process dropdown -->
      <div class="process-menu-wrap">
        <a
          href="#"
          class="hotspot process-nav"
          aria-label="Open Process menu"
        ></a>

        <div class="process-dropdown">
          <img
            src="Process-Dropdown-001.png"
            alt="Process dropdown menu"
            class="process-dropdown-image"
          />

          <a
            href="our-method.html"
            class="process-dropdown-link process-method-link"
            aria-label="Go to Our Method page"
          ></a>

          <a
            href="care.html"
            class="process-dropdown-link process-care-link"
            aria-label="Go to Care page"
          ></a>
        </div>
      </div>

      <!-- top nav: Contact -->
      <a
        href="#contact-section"
        class="hotspot top-contact"
        aria-label="Go to Contact section"
      ></a>

      <!-- bottom email -->
      <a
        href="mailto:breadoflifemills@gmail.com"
        class="hotspot email-link"
        aria-label="Email Bread of Life Mills"
      ></a>
    </div>
  </main>
</body>
</html>
