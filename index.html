<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bread of Life Mills</title>
  <link rel="icon" href="favicon.ico?v=4" sizes="any">
  <link rel="icon" type="image/png" sizes="512x512" href="breadoflifemills-favicon-b.png?v=4">
  <link rel="apple-touch-icon" href="breadoflifemills-favicon-b.png?v=4">
  <link rel="stylesheet" href="styles.css" />

  <style>
    .story-menu-wrap {
      transform: translateX(-400px);
    }

    .products-menu-wrap {
      transform: translateX(-200px) translateY(60px);
    }

    .products-baked-link {
      top: calc(100% + 156px);
    }

    /* DEBUG MODE: visible Products main hover target */
    .products-menu-wrap .process-nav {
      background: rgba(255, 230, 0, 0.35);
      outline: 2px solid #d6aa00;
    }

    /* DEBUG MODE: visible Products dropdown targets */
    .products-menu-wrap .process-dropdown-link {
      position: absolute;
      width: 100%;
      height: 52px;
    }

    .products-menu-wrap .process-method-link {
      background: rgba(255, 0, 0, 0.25);
      outline: 2px solid red;
    }

    .products-menu-wrap .process-care-link {
      background: rgba(0, 0, 255, 0.25);
      outline: 2px solid blue;
    }

    .products-menu-wrap .products-baked-link {
      background: rgba(0, 180, 0, 0.25);
      outline: 2px solid green;
    }

    @media (max-width: 768px) {
      .story-menu-wrap {
        transform: translateX(-106px);
      }

      .products-menu-wrap {
        transform: translateX(-55px) translateY(60px);
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .story-menu-wrap {
        transform: translateX(-220px);
      }

      .products-menu-wrap {
        transform: translateX(-120px) translateY(60px);
      }
    }
  </style>
</head>
<body>
  <main class="mockup-page">
    <div class="mockup-wrap">
      <img
        src="mock-website-003.jpg"
        alt="Bread of Life Mills website mockup"
        class="mockup-image"
      />

      <div id="contact-section" class="anchor-target contact-target" aria-hidden="true"></div>

      <a
        href="our-story.html"
        class="hotspot hero-explore-story"
        aria-label="Explore Our Story page"
      ></a>

      <div class="process-menu-wrap story-menu-wrap">
        <a href="#" class="hotspot process-nav" aria-label="Open Our Story menu"></a>

        <div class="process-dropdown">
          <img src="Our-Story-menu-001.png?v=2" alt="Our Story dropdown menu" class="process-dropdown-image"/>

          <a href="our-story.html" class="process-dropdown-link process-method-link" aria-label="Go to Our Story page"></a>
          <a href="why-wheat.html" class="process-dropdown-link process-care-link" aria-label="Go to Why Whole Wheat page"></a>
        </div>
      </div>

      <div class="process-menu-wrap products-menu-wrap">
        <a href="#" class="hotspot process-nav" aria-label="Open Products menu"></a>

        <div class="process-dropdown">
          <img src="Products-menu.png?v=2" alt="Products dropdown menu" class="process-dropdown-image"/>

          <a href="shop-wheat.html" class="process-dropdown-link process-method-link" aria-label="Go to Shop Wheat page"></a>
          <a href="shop-flour.html" class="process-dropdown-link process-care-link" aria-label="Go to Shop Flour page"></a>
          <a href="shop-baked-goods.html" class="process-dropdown-link products-baked-link" aria-label="Go to Shop Baked Goods page"></a>
        </div>
      </div>

      <div class="process-menu-wrap">
        <a href="#" class="hotspot process-nav" aria-label="Open Process menu"></a>

        <div class="process-dropdown">
          <img src="Process-Dropdown-001.png" alt="Process dropdown menu" class="process-dropdown-image"/>

          <a href="our-method.html" class="process-dropdown-link process-method-link" aria-label="Go to Our Method page"></a>
          <a href="care.html" class="process-dropdown-link process-care-link" aria-label="Go to Care page"></a>
        </div>
      </div>

      <a href="#contact-section" class="hotspot top-contact" aria-label="Go to Contact section"></a>

      <a href="mailto:breadoflifemills@gmail.com" class="hotspot email-link" aria-label="Email Bread of Life Mills"></a>
    </div>
  </main>
</body>
</html>
